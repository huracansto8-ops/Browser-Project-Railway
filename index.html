<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CS3</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f9cff">
<style>
:root{
  --bg:#0b1120;
  --glass:rgba(255,255,255,0.06);
  --glass-strong:rgba(255,255,255,0.12);
  --accent:#4f9cff;
  --accent-glow:rgba(79,156,255,0.7);
  --text:#e6edf3;
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:Inter,system-ui; background:linear-gradient(145deg,#0b1120,#0e1628); color:var(--text); height:100vh; overflow:hidden;
}
.app{display:flex;height:100%;width:100%;}
.sidebar{
  width:220px; background:var(--glass); backdrop-filter:blur(18px); border-right:1px solid var(--glass-strong);
  display:flex; flex-direction:column; align-items:center; padding:12px 6px; position:relative; transition:width .25s ease; overflow:hidden;
}
.sidebar.compact{width:65px;}
.sidebar::before{
  content:""; position:absolute; top:0; right:0; width:3px; height:100%;
  background:linear-gradient(to bottom,var(--accent),transparent,var(--accent));
  background-size:100% 200%; animation:beamFlow 4s linear infinite; box-shadow:0 0 18px var(--accent-glow);
}
@keyframes beamFlow{from{background-position:0 0}to{background-position:0 200%}}
.sidebar-top{display:flex;flex-direction:column;gap:8px;margin-bottom:15px;}
.sidebar-links{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;overflow-y:auto;}
.sidebar-link{
  width:90%; display:flex; align-items:center; gap:10px; padding:8px;
  border-radius:14px; cursor:pointer; transition:.2s ease; font-size:14px;
}
.sidebar-link img{width:22px;height:22px;border-radius:6px;}
.sidebar-link:hover{background:rgba(255,255,255,0.05);box-shadow:0 0 14px var(--accent-glow);transform:translateX(4px);}
.sidebar-link:active{transform:translateX(6px) scale(.96);box-shadow:0 0 20px var(--accent-glow);}
.sidebar.compact .sidebar-link span{display:none;}
.sidebar-add{width:90%;margin-top:10px;}
.main{flex:1;display:flex;flex-direction:column;}
.topbar{
  backdrop-filter:blur(14px);
  background:var(--glass);
  border-bottom:1px solid var(--glass-strong);
  display:flex;
  flex-direction:column;
  position:relative;
}
.tabs{display:flex;padding:8px;gap:8px;overflow-x:auto;}
.tab{background:var(--glass);padding:6px 14px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;min-width:40px;max-width:200px;overflow:hidden;}
.tab.active{background:var(--accent);box-shadow:0 0 12px var(--accent-glow);}
.tab span.title{white-space:nowrap;text-overflow:ellipsis;overflow:hidden;flex-grow:1;}
.tab-close{cursor:pointer;color:#ff5c5c;}
.tab-close:hover{opacity:0.8;}
.toolbar{display:flex;gap:8px;padding:10px;align-items:center;}
button{background:var(--glass);border:1px solid var(--glass-strong);color:var(--text);padding:6px 12px;border-radius:12px;cursor:pointer;}
.address{flex:1;padding:10px 14px;border:none;border-radius:20px;background:var(--glass);color:var(--text);outline:none;}
select{background:var(--glass);border:1px solid var(--glass-strong);color:var(--text);padding:4px;border-radius:6px;outline:none;}
select option{background:var(--bg);color:var(--text);}
.browser{flex:1;position:relative;}
iframe{position:absolute;width:100%;height:100%;border:none;display:none;opacity:0;transition:opacity .2s ease;}
iframe.active{display:block;opacity:1;}
iframe.loading{opacity:.4;}
.loading-bar {
  position: absolute;
  bottom: -1px; 
  left: 0;
  height: 3px;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
  width: 0%;
  opacity: 0;
  transition: width 0.3s ease, opacity 0.3s ease;
  z-index: 100;
}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button onclick="toggleIconMode()">⇔</button>
    </div>
    <div id="sidebarLinks" class="sidebar-links"></div>
    <button class="sidebar-add" onclick="addToSidebar()">＋</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="tabs" id="tabs"></div>
      <div class="toolbar">
        <button onclick="back()">←</button>
        <button onclick="forward()">→</button>
        <button onclick="reload()">⟳</button>
        <input id="address" class="address" placeholder="Search or enter web address">
        <button onclick="go()">Go</button>
        <button onclick="newTab()">＋</button>
        <button id="settingsBtn">⚙️</button>
      </div>
      <div id="loadingBar" class="loading-bar"></div>
    </div>
    <div class="browser" id="browser"></div>
  </div>
</div>

<div id="settingsPanel" style="position:absolute;top:50px;right:20px;width:260px;background:rgba(20,30,50,0.95);color:#e6edf3;border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:16px;display:none;z-index:999;">
  <h3 style="margin-top:0;">Settings</h3>
  <label style="display:block; margin-bottom:10px;">Search Engine: 
    <select id="searchEnginePicker" style="width:100%; margin-top:4px;">
      <option value="google">Google</option>
      <option value="duckduckgo">DuckDuckGo</option>
      <option value="bing">Bing</option>
    </select>
  </label>
  <label style="display:block; margin-bottom:10px;">Accent Color: <input type="color" id="accentPicker" value="#4f9cff" style="float:right;"></label>
  <label style="display:block; margin-bottom:10px;">Sidebar Compact: <input type="checkbox" id="sidebarCompactToggle" style="float:right;"></label>
  <label style="display:block; margin-bottom:10px;">Particle Background: <input type="checkbox" id="particleToggle" checked style="float:right;"></label>
</div>

<script>
let settings = JSON.parse(localStorage.getItem("settings") || "{}");
settings.sidebar = settings.sidebar || [];
settings.sidebarCompact = settings.sidebarCompact || false;
settings.accent = settings.accent || "#4f9cff";
settings.particlesEnabled = settings.particlesEnabled ?? true;
settings.searchEngine = settings.searchEngine || "google";

const browser = document.getElementById("browser");
const tabsDiv = document.getElementById("tabs");
const address = document.getElementById("address");
const loadingBar = document.getElementById("loadingBar");

let tabs = [], currentTab = null, draggedTab = null; 
let loadingInterval;

/* THEME */
function applyTheme(){
  document.documentElement.style.setProperty("--accent",settings.accent);
  const hex = settings.accent.replace("#","");
  const r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
  document.documentElement.style.setProperty("--accent-glow",`rgba(${r},${g},${b},0.7)`);
}

/* SIDEBAR */
function toggleIconMode(){settings.sidebarCompact=!settings.sidebarCompact;saveAll();applySidebarMode();}
function applySidebarMode(){const el=document.getElementById("sidebar");settings.sidebarCompact?el.classList.add("compact"):el.classList.remove("compact");}
function renderSidebar(){
  const container=document.getElementById("sidebarLinks");
  container.innerHTML="";
  settings.sidebar.forEach((link,index)=>{
    const el=document.createElement("div");
    el.className="sidebar-link"; el.title=link.title;
    const icon=document.createElement("img");
    try{icon.src="https://www.google.com/s2/favicons?domain="+new URL(link.url).hostname;}catch{icon.src="https://www.google.com/favicon.ico";}
    const text=document.createElement("span"); text.textContent=link.title;
    const deleteBtn=document.createElement("span"); deleteBtn.textContent="×";
    deleteBtn.style.marginLeft="auto"; deleteBtn.style.cursor="pointer"; deleteBtn.style.color="#ff5c5c";
    deleteBtn.onclick=e=>{ e.stopPropagation(); settings.sidebar.splice(index,1); saveAll(); };
    el.appendChild(icon); el.appendChild(text); el.appendChild(deleteBtn);
    el.onclick=()=>navigate(link.url,true);
    container.appendChild(el);
  });
}
function addToSidebar(){if(!currentTab)return;const url=currentTab.history[currentTab.index];
if(!url||settings.sidebar.find(l=>l.url===url))return;
settings.sidebar.push({title:currentTab.title.textContent||"New Tab",url});saveAll();}

/* LOADING BAR */
function startLoading() {
  clearInterval(loadingInterval); loadingBar.style.opacity = "1"; loadingBar.style.width = "15%"; let progress = 15;
  loadingInterval = setInterval(() => { progress += (90 - progress) * 0.05; loadingBar.style.width = progress + "%"; }, 200);
}
function stopLoading() {
  clearInterval(loadingInterval); loadingBar.style.width = "100%"; 
  setTimeout(() => { loadingBar.style.opacity = "0"; setTimeout(() => { loadingBar.style.width = "0%"; }, 300); }, 300);
}

/* NAVIGATION */
const shortcuts={desmos:"https://www.desmos.com",gmail:"https://mail.google.com",youtube:"https://www.youtube.com"};

function resolveInput(input){
  const trimmed = input.trim(), lower = trimmed.toLowerCase();
  if(shortcuts[lower]) return shortcuts[lower];
  if(/^https?:\/\//i.test(trimmed)) return trimmed;
  if(/^[^\s]+\.[a-z]{2,}(\/.*)?$/i.test(trimmed)) return "https://" + trimmed;
  const encoded = encodeURIComponent(trimmed);
  if (settings.searchEngine === "duckduckgo") return `https://duckduckgo.com/?q=${encoded}`;
  if (settings.searchEngine === "bing") return `https://www.bing.com/search?q=${encoded}`;
  return `https://www.google.com/search?q=${encoded}&igu=1`;
}

// UPDATED FOR PROXY
function navigate(input,isShortcut=false){
  if(!currentTab)return;
  const url=isShortcut?input:resolveInput(input); if(!url)return;
  const tab=currentTab; tab.history=tab.history.slice(0,tab.index+1); tab.history.push(url); tab.index=tab.history.length-1;
  tab.iframe.classList.add("loading"); startLoading();
  tab.iframe.onload=()=>{
    tab.iframe.classList.remove("loading"); stopLoading();
    try{tab.title.textContent = tab.iframe.contentDocument.title || new URL(url).hostname;}catch{tab.title.textContent = new URL(url).hostname;}
    address.value=url;
  }; 
  // Route through proxy
  tab.iframe.src = window.location.origin + "/proxy?url=" + encodeURIComponent(url);
}

function go(){const val=address.value.trim(); if(val)navigate(val);}
address.addEventListener("keydown",e=>{if(e.key==="Enter")go();});

/* TABS */
function newTab(){
  const id = Date.now();
  const iframe = document.createElement("iframe");
  iframe.dataset.id = id;
  browser.appendChild(iframe);
  const tab = { id, iframe, history: [], index: -1 };
  tabs.push(tab);
  const btn = document.createElement("div");
  btn.className = "tab"; btn.draggable = true;
  const titleSpan = document.createElement("span");
  titleSpan.className="title"; titleSpan.textContent = "Tab";
  btn.appendChild(titleSpan);
  const closeBtn = document.createElement("span");
  closeBtn.textContent = "×"; closeBtn.className="tab-close";
  closeBtn.onclick = e => { e.stopPropagation(); closeTab(id); };
  btn.appendChild(closeBtn);
  btn.onclick = () => switchTab(id);

  // Drag and drop logic
  btn.addEventListener("dragstart", e => { draggedTab = btn; btn.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; btn.style.opacity = "0.5"; });
  btn.addEventListener("dragend", e => { draggedTab = null; btn.classList.remove("dragging"); btn.style.opacity = "1"; });
  btn.addEventListener("dragover", e => e.preventDefault());
  btn.addEventListener("drop", e => {
    e.preventDefault(); if(!draggedTab || draggedTab === btn) return;
    const allTabs = Array.from(tabsDiv.children);
    const draggedIndex = allTabs.indexOf(draggedTab), targetIndex = allTabs.indexOf(btn);
    if (draggedIndex < targetIndex) tabsDiv.insertBefore(draggedTab, btn.nextSibling); else tabsDiv.insertBefore(draggedTab, btn);
  });

  tabsDiv.appendChild(btn);
  tab.button = btn; tab.title = titleSpan;
  switchTab(id);

  if(settings.particlesEnabled){
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(`<html><head><style>html,body{margin:0;padding:0;overflow:hidden;background:#0b1120;}canvas{display:block;}</style></head><body><canvas id="particleCanvas"></canvas><script>
const canvas=document.getElementById('particleCanvas');const ctx=canvas.getContext('2d');let w=canvas.width=window.innerWidth,h=canvas.height=window.innerHeight;const mouse={x:null,y:null,radius:120};const particles=Array.from({length:120},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*1.2,vy:(Math.random()-0.5)*1.2,size:Math.random()*2+1.5}));function animate(){ctx.clearRect(0,0,w,h);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.fillStyle='rgba(79,156,255,0.8)';ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();
<\/script></body></html>`);
    doc.close();
  }
}

function switchTab(id){tabs.forEach(tab=>{tab.iframe.classList.remove("active"); tab.button.classList.remove("active");if(tab.id===id){currentTab=tab; tab.iframe.classList.add("active"); tab.button.classList.add("active"); address.value=tab.history[tab.index]||"";}});}
function closeTab(id){const tab=tabs.find(t=>t.id===id); if(!tab)return; tab.iframe.remove(); tab.button.remove(); tabs=tabs.filter(t=>t.id!==id); if(currentTab?.id===id){if(tabs.length)switchTab(tabs[0].id);else currentTab=null;}}

// UPDATED FOR PROXY
function back(){if(currentTab&&currentTab.index>0){currentTab.index--; currentTab.iframe.src=window.location.origin + "/proxy?url=" + encodeURIComponent(currentTab.history[currentTab.index]); address.value=currentTab.history[currentTab.index];}}
function forward(){if(currentTab&&currentTab.index<currentTab.history.length-1){currentTab.index++; currentTab.iframe.src=window.location.origin + "/proxy?url=" + encodeURIComponent(currentTab.history[currentTab.index]); address.value=currentTab.history[currentTab.index];}}
function reload(){if(currentTab)currentTab.iframe.src=currentTab.iframe.src;}

/* SETTINGS LOGIC */
const settingsBtn = document.getElementById("settingsBtn"), settingsPanel = document.getElementById("settingsPanel");
settingsBtn.onclick = () => settingsPanel.style.display = settingsPanel.style.display === "none" ? "block" : "none";
document.getElementById("accentPicker").oninput = e => { settings.accent = e.target.value; applyTheme(); saveAll(); };
document.getElementById("sidebarCompactToggle").onchange = e => { settings.sidebarCompact = e.target.checked; applySidebarMode(); saveAll(); };
document.getElementById("particleToggle").onchange = e => { settings.particlesEnabled = e.target.checked; saveAll(); };
document.getElementById("searchEnginePicker").onchange = e => { settings.searchEngine = e.target.value; saveAll(); };
document.addEventListener("click", e => { if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) settingsPanel.style.display = "none"; });

function saveAll(){localStorage.setItem("settings",JSON.stringify(settings)); renderSidebar(); applySidebarMode();}
applyTheme(); newTab(); renderSidebar(); applySidebarMode();

/* SHORTCUTS */
document.addEventListener("keydown", e => {
  if(e.ctrlKey && e.key === "t"){ e.preventDefault(); newTab(); }
  if(e.ctrlKey && e.key === "w"){ e.preventDefault(); if(currentTab) closeTab(currentTab.id); }
});

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
